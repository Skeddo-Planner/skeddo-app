    <!-- Structured Data: FAQPage (from Help page) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Skeddo free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Skeddo is free to use. We may introduce optional premium features in the future, but the core planning tools will always be free."
          }
        },
        {
          "@type": "Question",
          "name": "How do I add a program to my list?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Go to the Search tab, find a program you like, and tap it. From the detail view, you can save it to your list and set its status (Exploring, Waitlist, or Enrolled)."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use Skeddo for multiple kids?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. Add as many kids as you need from the Home tab. You can assign programs to specific kids and filter views per child."
          }
        },
        {
          "@type": "Question",
          "name": "Where does the program data come from?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We source program information directly from provider websites and registration systems across Vancouver. We verify details regularly, but always confirm with the provider before registering."
          }
        },
        {
          "@type": "Question",
          "name": "Can I install Skeddo on my phone?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Skeddo is a web app that works like a native app. On your phone, tap 'Add to Home Screen' from your browser menu to install it."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data safe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your data is stored securely with Supabase (built on PostgreSQL with row-level security). We never sell or share your personal information."
          }
        },
        {
          "@type": "Question",
          "name": "How do I delete my account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Contact us at skeddo.planner@gmail.com and we'll take care of it. We'll delete all your data within 48 hours."
          }
        },
        {
          "@type": "Question",
          "name": "I found incorrect program information. What should I do?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Please let us know! Email skeddo.planner@gmail.com with the program name and what needs updating. We appreciate the help keeping our data accurate."
          }
        }
      ]
    }
    </script>
