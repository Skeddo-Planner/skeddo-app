# Skeddo -- Auto-refresh + validate program data from all sources
#
# Runs daily at 6 AM Pacific (2 PM UTC) and can also be triggered manually.
# Pipeline:
#   1. Refresh data from City of Vancouver (ActiveNet API)
#   2. Refresh data from City of Richmond (PerfectMind system)
#   3. Refresh data from private providers (web scraping)
#   4. Validate data quality rules (validate-programs.cjs)
#   5. Auto-resolve violations on newly changed programs (auto-resolve-violations.cjs)
#   6. Validate URLs -- fix broken links (validate-urls.cjs)
#   7. Incremental source-of-truth verification (verify-programs.cjs)
#   8. Quarantine programs that still have violations after all auto-fixes
#   9. Commit any auto-fixed programs.json changes back to the repo
#
# Required repository secrets (set in GitHub > Settings > Secrets):
#   SUPABASE_URL              - Your Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY - Your Supabase service role key (NOT the anon key)

name: Refresh Programs

on:
  schedule:
    # 6 AM Pacific = 2 PM UTC (during PDT; 7 AM PST = 3 PM UTC during PST)
    - cron: '0 14 * * *'
  workflow_dispatch: # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Extended to accommodate URL validation (~23 min for full run)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need a token with write access to push back auto-fixed programs.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # -- Data refresh --

      - name: Refresh City of Vancouver (ActiveNet)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/refresh-activenet.js

      - name: Refresh City of Richmond (PerfectMind)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/refresh-richmond.js

      - name: Refresh Private Providers (web scraping)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/refresh-private.js

      # -- Enrollment status refresh --

      - name: Update ActiveNet enrollment statuses
        # Checks all COV/BNB/WV/PC/LGY programs against the ActiveNet REST API
        # to fix stale enrollment statuses (Open->Full, Open->Waitlist, etc.)
        # This catches programs that fill up between data refreshes.
        continue-on-error: true
        run: node scripts/update-activenet-status.cjs --fix

      # -- Data quality validation --

      - name: Compute derived fields
        # Fill in scheduleType, dayLength, durationPerDay, etc. from existing data
        continue-on-error: true
        run: node scripts/fill-computable-fields.cjs

      - name: Validate data quality rules
        # Auto-fix known violations (cost types, status mismatches, duplicate cleanup, etc.)
        # Continues even if violations remain so later steps still run
        continue-on-error: true
        run: node scripts/validate-programs.cjs --fix

      - name: Auto-resolve violations on newly changed programs
        # Identify programs changed by the scrapers, then apply additional offline
        # resolution (R2 repeating inference, R11 address lookup, R7 estimate marking,
        # R29/R32 URL path resolution via HTTP HEAD).
        # Writes unresolvable programs to src/data/quarantined-programs.json.
        continue-on-error: true
        run: |
          echo "--- Identifying programs changed since last commit ---"
          # Save original programs.json hash for comparison
          ORIG_HASH=$(git show HEAD:src/data/programs.json 2>/dev/null | md5sum | cut -d' ' -f1 || echo "none")
          CURR_HASH=$(md5sum src/data/programs.json | cut -d' ' -f1)

          if [ "$ORIG_HASH" = "$CURR_HASH" ]; then
            echo "No changes to programs.json from scrapers. Skipping auto-resolve."
            exit 0
          fi

          echo "--- Extracting changed program IDs ---"
          CHANGED_IDS=$(node -e "
            const fs = require('fs');
            const { execSync } = require('child_process');
            let oldPrograms = [];
            try {
              const oldJson = execSync('git show HEAD:src/data/programs.json', { encoding: 'utf8' });
              oldPrograms = JSON.parse(oldJson);
            } catch(e) {}
            const newPrograms = JSON.parse(fs.readFileSync('src/data/programs.json', 'utf8'));
            const oldById = {};
            oldPrograms.forEach(p => { oldById[String(p.id)] = JSON.stringify(p); });
            const changed = newPrograms
              .filter(p => !oldById[String(p.id)] || oldById[String(p.id)] !== JSON.stringify(p))
              .map(p => String(p.id));
            console.log(changed.join(','));
          " 2>/dev/null)

          if [ -z "$CHANGED_IDS" ]; then
            echo "No changed program IDs found."
            exit 0
          fi

          echo "Changed programs: $(echo $CHANGED_IDS | tr ',' '\n' | wc -l) programs"

          echo "--- Running auto-resolve (online mode, with URL checks) ---"
          node scripts/auto-resolve-violations.cjs "--ids=${CHANGED_IDS}" || true

          echo "--- Checking for remaining violations on changed programs ---"
          VIOLATIONS_JSON=$(node scripts/auto-resolve-violations.cjs "--ids=${CHANGED_IDS}" --report --json 2>/dev/null || echo '{"resolved":0,"unresolvable":[]}')
          UNRESOLVABLE_COUNT=$(echo "$VIOLATIONS_JSON" | node -e "
            let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>{
              try { const j=JSON.parse(d); console.log(j.unresolvable.length); }
              catch(e) { console.log(0); }
            });
          " <<< "$VIOLATIONS_JSON" 2>/dev/null || echo "0")

          echo "Unresolvable violations on changed programs: $UNRESOLVABLE_COUNT"

          if [ "$UNRESOLVABLE_COUNT" -gt "0" ]; then
            echo "--- Writing quarantine tracking file ---"
            DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            node -e "
              const fs = require('fs');
              const path = require('path');
              const violationsJson = \`${VIOLATIONS_JSON}\`;
              const newData = JSON.parse(violationsJson);

              // Load existing quarantine file (if any)
              const qPath = path.join('src', 'data', 'quarantined-programs.json');
              let existing = { lastUpdated: '', programs: [] };
              if (fs.existsSync(qPath)) {
                try { existing = JSON.parse(fs.readFileSync(qPath, 'utf8')); } catch(e) {}
              }

              // Merge: update existing entries, add new ones
              const existingById = {};
              existing.programs.forEach(p => { existingById[p.id] = p; });

              const now = '${DATE}';
              newData.unresolvable.forEach(({ id, violations }) => {
                if (existingById[id]) {
                  existingById[id].violations = violations;
                  existingById[id].lastSeen = now;
                  existingById[id].resolveAttempts = (existingById[id].resolveAttempts || 0) + 1;
                } else {
                  existingById[id] = { id, violations, quarantinedAt: now, lastSeen: now, resolveAttempts: 1 };
                }
              });

              const result = {
                lastUpdated: now,
                note: 'Programs with violations that could not be auto-resolved. Run auto-resolve-violations.cjs or fix manually.',
                programs: Object.values(existingById).sort((a,b) => b.resolveAttempts - a.resolveAttempts),
              };
              fs.writeFileSync(qPath, JSON.stringify(result, null, 2));
              console.log('Quarantine file updated: ' + result.programs.length + ' programs tracked.');
            " 2>/dev/null || true
          else
            echo "All violations on changed programs were resolved!"
            # Clear resolved programs from quarantine file
            node -e "
              const fs = require('fs'), path = require('path');
              const ids = new Set('${CHANGED_IDS}'.split(','));
              const qPath = path.join('src', 'data', 'quarantined-programs.json');
              if (!fs.existsSync(qPath)) { process.exit(0); }
              let q;
              try { q = JSON.parse(fs.readFileSync(qPath, 'utf8')); } catch(e) { process.exit(0); }
              const before = q.programs.length;
              q.programs = q.programs.filter(p => !ids.has(String(p.id)));
              if (q.programs.length !== before) {
                q.lastUpdated = new Date().toISOString();
                fs.writeFileSync(qPath, JSON.stringify(q, null, 2));
                console.log('Removed ' + (before - q.programs.length) + ' resolved programs from quarantine.');
              }
            " 2>/dev/null || true
          fi

      - name: Validate and fix broken URLs
        # Checks every registrationUrl -- fixes 404s, homepage redirects, client errors.
        # Uses --limit=500 to stay well within the 60-minute job timeout on a daily run.
        # Run manually with no --limit for a full audit: node scripts/validate-urls.cjs --fix
        continue-on-error: true
        run: node scripts/validate-urls.cjs --fix --limit=500

      - name: Incremental source-of-truth verification
        # Checks programs not verified in the last 7 days -- cross-checks name, price, and
        # enrollment status against the live registration page.
        # Uses --limit=200 to keep this step under ~5 minutes (200 x 750ms ~ 2.5 min + overhead).
        # Full audit: node scripts/verify-programs.cjs --audit --fix
        continue-on-error: true
        run: node scripts/verify-programs.cjs --incremental --fix --limit=200

      # -- Resolve quarantined programs (opportunistic) --

      - name: Attempt to resolve previously quarantined programs
        # Try web-based resolution for programs in the quarantine file.
        # This runs AFTER URL validation so the most up-to-date URLs are used.
        continue-on-error: true
        run: |
          QFILE="src/data/quarantined-programs.json"
          if [ ! -f "$QFILE" ]; then
            echo "No quarantine file found. Skipping."
            exit 0
          fi
          QCOUNT=$(node -e "
            const q = JSON.parse(require('fs').readFileSync('$QFILE'));
            console.log(q.programs.length);
          " 2>/dev/null || echo "0")
          if [ "$QCOUNT" -eq "0" ]; then
            echo "Quarantine file is empty. Nothing to resolve."
            exit 0
          fi
          echo "Attempting to resolve $QCOUNT quarantined program(s)..."
          QIDS=$(node -e "
            const q = JSON.parse(require('fs').readFileSync('$QFILE'));
            console.log(q.programs.map(p=>p.id).join(','));
          " 2>/dev/null || echo "")
          if [ -n "$QIDS" ]; then
            node scripts/auto-resolve-violations.cjs "--ids=${QIDS}" || true
          fi

      # -- Commit auto-fixes back to repo --

      - name: Commit auto-fixed programs.json (if changed)
        run: |
          git config user.name  "Skeddo Pipeline"
          git config user.email "pipeline@skeddo.ca"

          # Stage all changed data files
          git add src/data/programs.json
          git add scripts/verify-state.json 2>/dev/null || true
          git add src/data/quarantined-programs.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit -- nothing changed."
          else
            # Build summary for commit message
            PROGRAM_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/data/programs.json')).length)" 2>/dev/null || echo "?")
            QCOUNT=$(node -e "
              const fs = require('fs');
              if (!fs.existsSync('src/data/quarantined-programs.json')) { console.log(0); process.exit(0); }
              console.log(JSON.parse(fs.readFileSync('src/data/quarantined-programs.json')).programs.length);
            " 2>/dev/null || echo "0")

            git commit -m "$(cat <<EOF
          chore: auto-fix data quality issues [skip ci]

          Auto-applied by daily pipeline:
          - fill-computable-fields.cjs (computed field inference)
          - validate-programs.cjs --fix (data quality rules)
          - auto-resolve-violations.cjs (R2/R7/R11/R29/R32 resolution)
          - validate-urls.cjs --fix (broken URL resolution)
          - verify-programs.cjs --incremental --fix (source-of-truth verification)

          Programs: ${PROGRAM_COUNT} total | Quarantined: ${QCOUNT} with unresolvable violations
          EOF
          )"
            git push
          fi

      # -- Report --

      - name: Report results
        if: always()
        run: |
          echo "Pipeline completed at $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo ""
          echo "Steps run:"
          echo "  1. Refresh:       ActiveNet (CoV), PerfectMind (Richmond), Private providers"
          echo "  1b. Status:       ActiveNet enrollment status refresh (update-activenet-status.cjs)"
          echo "  2. Compute:       fill-computable-fields.cjs"
          echo "  3. Validate:      data quality rules (validate-programs.cjs --fix)"
          echo "  4. Auto-resolve:  offline + web resolution for changed programs"
          echo "  5. Validate URLs: URL resolution (validate-urls.cjs --limit=500)"
          echo "  6. Verify:        incremental source-of-truth (verify-programs.cjs --limit=200)"
          echo "  7. Quarantine:    programs with unresolvable violations -> src/data/quarantined-programs.json"
          echo ""
          if [ -f "src/data/quarantined-programs.json" ]; then
            QCOUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/data/quarantined-programs.json')).programs.length)" 2>/dev/null || echo "?")
            echo "Quarantined programs: ${QCOUNT} (see src/data/quarantined-programs.json)"
          fi
          echo ""
          echo "For a full URL audit: node scripts/validate-urls.cjs --fix"
          echo "For a full verify audit: node scripts/verify-programs.cjs --audit --fix"
          echo "To resolve quarantined programs: node scripts/auto-resolve-violations.cjs --all"
